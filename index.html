<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Radial Composition</title>
    
    <style>
        body {
            margin: 0;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .base-circle {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            background-color: #FFFFFF;
            border-radius: 50%;
            z-index: -2; 
        }

        .canvas {
            width: 90vmin;
            height: 90vmin;
            background-color: transparent; 
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            animation: slow-spin 120s linear infinite;
            z-index: 1; 
            pointer-events: none; 
        }

        .inner-canvas {
            position: absolute;
            width: 54vmin;
            height: 54vmin;
            border-radius: 50%;
            animation: slow-spin 120s linear infinite;
            z-index: -1; 
            pointer-events: none;
        }

        .inner-canvas .element-wrapper {
            width: 27.5%; 
            left: 36.25%; 
            pointer-events: auto;
        }

        @keyframes slow-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .element-wrapper {
            position: absolute;
            width: 16.5%; 
            height: 50%; 
            bottom: 50%; 
            left: 41.75%; 
            transform-origin: bottom center;
            transition: z-index 0s 0.5s;
            --size-factor: 1;
            pointer-events: auto; 
        }

        .element-wrapper.extra-small { --size-factor: 0.9; }
        .element-wrapper.double-size { --size-factor: 2; }
        .element-wrapper.inner-small { --size-factor: 0.8; }
        .element-wrapper.size-plus-15 { --size-factor: 1.15; }
        .element-wrapper.background { z-index: -1; }

        .element-wrapper[class*="trigger-popup-"] {
            /* Z-index elvesztése: 0.5s várakozás + 0.5s fade out = 1s */
            transition: z-index 0s 1s;
        }

        .element-wrapper:hover { 
            z-index: 150; 
            transition: z-index 0s 0s; 
        }

        .element-wrapper[class*="trigger-popup-"]:hover {
            z-index: 160;
        }
        
        .svg-container {
            width: 100%;
            height: auto;
            position: absolute;
            top: 0;
            transform: rotate(180deg);
        }

        .wave-wrapper {
            width: 100%;
            height: auto;
            transform-origin: bottom center;
            animation: bubble-gum-wave 30s ease-in-out infinite alternate;
        }

        .svg-container img {
            width: 100%;
            height: auto;
            display: block;
            transform-origin: bottom center;
            transform: scale(calc(var(--base-scale) * var(--size-factor)));
            transition: transform 30s ease-in-out, filter 15s ease;
        }

        .element-wrapper[class*="trigger-popup-"] .svg-container img {
            /* Virág visszazsugorodásának kezdete: 6s helyett 0.5s */
            transition: transform 30s ease-in-out 0.5s, filter 15s ease 0.5s;
        }

        .element-wrapper:hover .svg-container img {
            transform: scale(calc((var(--base-scale) * var(--size-factor)) + 0.12));
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.8));
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .element-wrapper[class*="trigger-popup-"]:hover .svg-container img {
            transform: scale(calc((var(--base-scale) * var(--size-factor)) + 0.22));
            filter: drop-shadow(0 0 35px rgba(255, 255, 255, 1));
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s, filter 0.4s ease 0s;
        }

        body:has([class*="trigger-popup-"]:hover) .element-wrapper:not(:hover) .svg-container img {
            transform: scale(calc((var(--base-scale) * var(--size-factor)) - 0.15));
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s; 
        }

        @keyframes bubble-gum-wave {
            0% { transform: rotate(0deg) skew(0deg, 0deg) scale(1); }
            25% { transform: rotate(15deg) skew(-10deg, 6deg) scale(1.15, 0.85); }
            50% { transform: rotate(-12deg) skew(8deg, -5deg) scale(0.9, 1.15); }
            75% { transform: rotate(10deg) skew(-6deg, 8deg) scale(1.1, 0.9); }
            100% { transform: rotate(0deg) skew(0deg, 0deg) scale(1); }
        }

        .element-1 { transform: rotate(0deg); --base-scale: 0.75; }
        .element-2 { transform: rotate(15deg); --base-scale: 0.95; }
        .element-3 { transform: rotate(30deg); --base-scale: 0.82; }
        .element-4 { transform: rotate(45deg); --base-scale: 0.88; }
        .element-5 { transform: rotate(60deg); --base-scale: 0.91; }
        .element-6 { transform: rotate(75deg); --base-scale: 0.78; }
        .element-7 { transform: rotate(90deg); --base-scale: 0.85; }
        .element-8 { transform: rotate(105deg); --base-scale: 0.92; }
        .element-9 { transform: rotate(120deg); --base-scale: 0.80; }
        .element-10 { transform: rotate(135deg); --base-scale: 0.89; }
        .element-11 { transform: rotate(150deg); --base-scale: 0.94; }
        .element-12 { transform: rotate(165deg); --base-scale: 0.76; }
        .element-13 { transform: rotate(180deg); --base-scale: 0.83; }
        .element-14 { transform: rotate(195deg); --base-scale: 0.90; }
        .element-15 { transform: rotate(210deg); --base-scale: 0.87; }
        .element-16 { transform: rotate(225deg); --base-scale: 0.93; }
        .element-17 { transform: rotate(240deg); --base-scale: 0.79; }
        .element-18 { transform: rotate(255deg); --base-scale: 0.86; }
        .element-19 { transform: rotate(270deg); --base-scale: 0.91; }
        .element-20 { transform: rotate(285deg); --base-scale: 0.84; }
        .element-21 { transform: rotate(300deg); --base-scale: 0.77; }
        .element-22 { transform: rotate(315deg); --base-scale: 0.96; }
        .element-23 { transform: rotate(330deg); --base-scale: 0.81; }
        .element-24 { transform: rotate(345deg); --base-scale: 0.88; }

        .inner-element-1 { transform: rotate(0deg); --base-scale: 0.85; }
        .inner-element-2 { transform: rotate(120deg); --base-scale: 0.95; }
        .inner-element-3 { transform: rotate(240deg); --base-scale: 0.90; }

        /* --- POPUP ALAP STÍLUSOK --- */
        .info-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 45vmin; 
            height: 45vmin;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 100;
            pointer-events: none; 
            opacity: 0;
            visibility: hidden;
            
            /* Általános esetben: 0.5s várakozás, utána 0.5s fade out */
            transition: opacity 0.5s ease-in-out 0.5s, visibility 0s linear 1s;
            
            background: radial-gradient(circle, rgba(255,255,255,0.95) 40%, rgba(255,255,255,0) 75%);
            animation: popup-counter-spin 120s linear infinite;
        }

        @keyframes popup-counter-spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        /* GYORS VÁLTÁS: Ha más virágra lépünk, az egész popup rendszer azonnal 0.4s-re vált */
        .canvas:has([class*="trigger-popup-"]:hover) .info-popup {
            transition: opacity 0.4s ease-in-out 0s, visibility 0s linear 0.4s;
        }

        /* Megjelenítés: Felerősödés (késleltetés nélkül, hogy ne villanjon be a régi) */
        .canvas:has(.trigger-popup-A:hover) .info-popup-A,
        .canvas:has(.trigger-popup-B:hover) .info-popup-B,
        .canvas:has(.trigger-popup-C:hover) .info-popup-C,
        .canvas:has(.trigger-popup-D:hover) .info-popup-D {
            opacity: 1;
            visibility: visible;
            z-index: 105;
            transition: opacity 0.4s ease-in-out 0s, visibility 0s linear 0s !important;
        }

        .popup-title {
            font-family: Arial, sans-serif;
            font-weight: normal;
            font-size: 2.2vmin;
            color: #000;
            line-height: 1.2;
            margin-bottom: 0.5vmin;
        }

        .popup-subtitle {
            font-family: Arial, sans-serif;
            font-weight: normal;
            font-size: 1.5vmin;
            color: #444;
            margin-bottom: 2vmin;
        }

        .popup-image {
            height: 22vmin;
            width: auto;
            max-width: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
